; AtomKey - WinKey-protocol-compatible CW keyer firmware for M5Stack Atom Lite
;
; The Atom Lite is an ESP32-PICO-D4. We use the Arduino framework.
;
; NOTE: the USB serial port speaks the WinKey *binary* protocol at 1200 baud
; (WinKey spec). It is NOT a text console. If you open the PlatformIO monitor
; you will see raw protocol bytes, not log lines. Status/feedback is on the LED.

[env:atom]
platform = espressif32
board = m5stack-atom
framework = arduino

; 1200 baud matches the WinKey host serial spec (8N1). The monitor is set to
; the same so `pio device monitor` can poke the protocol by hand.
monitor_speed = 1200

; CHANGE THIS TO YOUR OWN PORT. Run `pio device list` to find it. You can use
; either a simple device node like /dev/ttyUSB1 (quick, but the number can
; change when other USB serial devices appear, e.g. powering on a rig) or a
; stable by-id symlink (recommended) which is keyed to the adapter's serial
; number and never moves: `ls /dev/serial/by-id/`.
;
; The Atom Lite enumerates as an FTDI FT232R (VID:PID 0403:6001, "M5stack"),
; the same chip family as some rig CAT cables, so auto-detect can grab the
; wrong device -- pinning the port explicitly avoids flashing the wrong thing.
;
; The path below is the author's specific Atom (its serial number is baked in)
; -- yours will differ.
upload_port  = /dev/serial/by-id/usb-Hades2001_M5stack_6152C6494E-if00-port0
monitor_port = /dev/serial/by-id/usb-Hades2001_M5stack_6152C6494E-if00-port0

lib_deps =
    fastled/FastLED@^3.6.0
