; AtomKey - WinKey-protocol-compatible CW keyer firmware for M5Stack Atom Lite
;
; The Atom Lite is an ESP32-PICO-D4. We use the Arduino framework.
;
; NOTE: the USB serial port speaks the WinKey *binary* protocol at 1200 baud
; (WinKey spec). It is NOT a text console. If you open the PlatformIO monitor
; you will see raw protocol bytes, not log lines. Status/feedback is on the LED.

[env:atom]
platform = espressif32
board = m5stack-atom
framework = arduino

; 1200 baud matches the WinKey host serial spec (8N1). The monitor is set to
; the same so `pio device monitor` can poke the protocol by hand.
monitor_speed = 1200

; This Atom Lite uses an FTDI FT232R (VID:PID 0403:6001), same chip family as
; some rig CAT cables, so auto-detect can grab the wrong port. Pin the Atom
; explicitly. NOTE: /dev/ttyUSBn ordering can swap on reboot/replug; for a
; rock-solid binding switch these to the stable symlink under
; /dev/serial/by-id/ (run `ls /dev/serial/by-id/` to find it).
upload_port  = /dev/ttyUSB1
monitor_port = /dev/ttyUSB1

lib_deps =
    fastled/FastLED@^3.6.0
